<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Birthday Sayang ❤️</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body::before {
        content: "";
        position: fixed;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.14), transparent 60%);
        animation: floatGlow 10s ease-in-out infinite;
        z-index: 0;
        will-change: transform;
    }

    @keyframes floatGlow {
        0% { transform: translate(-10%, -10%) scale(1); }
        50% { transform: translate(-6%, -14%) scale(1.15); }
        100% { transform: translate(-10%, -10%) scale(1); }
    }

    .card {
        background: rgba(255,255,255,0.92);
        padding: 38px;
        border-radius: 22px;
        text-align: center;
        box-shadow: 0 18px 50px rgba(0,0,0,0.18);
        animation: fadeIn 1.2s ease-out, breathe 5s ease-in-out infinite;
        width: 90%;
        max-width: 450px;
        backdrop-filter: blur(14px);
        z-index: 10;
        position: relative;
    }

    @keyframes breathe {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.015); }
    }

    h1 {
        color: #ff4f78;
        font-size: 2.1em;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.05em;
        color: #555;
        line-height: 1.5;
    }

    #heart {
        font-size: 52px;
        animation: beat 1.4s ease-in-out infinite;
        margin: 18px 0;
        filter: drop-shadow(0 0 12px rgba(255,94,126,0.5));
    }

    button {
        background: #ff5e7e;
        color: white;
        padding: 12px 22px;
        font-size: 1.05em;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.25s ease;
        will-change: transform;
    }

    button:hover {
        transform: scale(1.04);
        background: #ff2d55;
    }

    button:active {
        transform: scale(0.98);
    }

    @keyframes beat {
        0% {transform: scale(1);}
        50% {transform: scale(1.15);}
        100% {transform: scale(1);}
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(18px);}
        to {opacity: 1; transform: translateY(0);}
    }

    /* INTRO */
    #intro {
        position: fixed;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        flex-direction: column;
        transition: opacity 1.2s ease;
    }

    #introText {
        color: white;
        font-size: 1.15em;
        text-align: center;
        opacity: 0;
        transition: 0.8s ease;
        padding: 20px;
    }

    /* POPUP */
    .popup-bg {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        display: flex;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(10px);
        opacity: 0;
        pointer-events: none;
        transition: 0.35s ease;
        z-index: 1000;
    }

    .popup-bg.active {
        opacity: 1;
        pointer-events: auto;
    }

    .popup-box {
        background: #fff;
        padding: 22px;
        border-radius: 14px;
        text-align: center;
        max-width: 300px;
        animation: pop 0.35s ease;
    }

    @keyframes pop {
        from {transform: scale(0.9); opacity: 0;}
        to {transform: scale(1); opacity: 1;}
    }

    .close-btn {
        margin-top: 12px;
        background: #ff5e7e;
        color: white;
        padding: 10px 18px;
        border: none;
        border-radius: 10px;
    }

    /* PHOTO */
    .photo-popup-bg {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: 0.4s ease;
        z-index: 900;
    }

    .photo-popup-bg.active {
        opacity: 1;
        pointer-events: auto;
    }

    .photo-container {
        display: flex;
        gap: 14px;
        overflow-x: auto;
        width: 85%;
        max-width: 420px;
        padding: 10px;
        scroll-behavior: smooth;
    }

    .photo-item {
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        opacity: 0;
        transform: scale(0.92);
        animation: photoIn 0.6s ease forwards;
    }

    @keyframes photoIn {
        to { opacity: 1; transform: scale(1); }
    }

    /* FALL */
    .fall {
        position: fixed;
        top: -10px;
        pointer-events: none;
        z-index: 1;
        opacity: 0.85;
        animation: fall linear forwards;
    }

    @keyframes fall {
        0% { transform: translateY(-10vh); opacity: 0; }
        15% { opacity: 1; }
        100% { transform: translateY(110vh); opacity: 0; }
    }

    .bg-heart {
        position: fixed;
        font-size: 18px;
        opacity: 0.12;
        animation: floatHeart 7s ease-in-out infinite;
        z-index: 0;
    }

    @keyframes floatHeart {
        0% { transform: translateY(0); }
        50% { transform: translateY(-18px); }
        100% { transform: translateY(0); }
    }

    /* 🎇 CONFETTI */
    .confetti {
        position: fixed;
        width: 8px;
        height: 12px;
        top: -10px;
        z-index: 9999;
        animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
        to {
            transform: translateY(110vh) rotate(720deg);
        }
    }

</style>
</head>

<body>

<!-- 🎵 MUSIC (TAMBAHAN TANPA MERUSAK STRUKTUR) -->
<audio id="bgm" loop>
    <source src="Ed Sheeran - Photograph.mp3" type="audio/mp3">
</audio>

<div id="intro">
    <div id="introText"></div>
</div>

<div class="card">
    <h1>Happy Birthday ❤️</h1>
    <div id="heart">🎂</div>

    <p>
        Hari ini bukan hari biasa...<br>
        hari ini hari seseorang yang paling spesial 💗
    </p>

    <button onclick="start()">Buka Hadiah 🎁</button>
</div>

<div id="popup" class="popup-bg">
    <div class="popup-box">
        <h3 id="popup-title"></h3>
        <p id="popup-msg"></p>
        <button class="close-btn" onclick="closePop()">Oke 💗</button>
    </div>
</div>

<div id="photoPopup" class="photo-popup-bg" onclick="this.classList.remove('active')">
    <div class="photo-container" id="photoContainer"></div>
</div>

<script>

const introLines = [
    "Hari ini bukan hari biasa...",
    "Ada seseorang yang spesial banget 🎂",
    "Dan dunia hari ini jadi lebih hangat ❤️"
];

let introIndex = 0;

function playIntro() {
    const introText = document.getElementById("introText");

    if (introIndex < introLines.length) {
        introText.style.opacity = 0;

        setTimeout(() => {
            introText.innerText = introLines[introIndex];
            introText.style.opacity = 1;
            introIndex++;
        }, 500);

        setTimeout(playIntro, 1800);
    } else {
        document.getElementById("intro").style.opacity = 0;
        setTimeout(() => document.getElementById("intro").style.display = "none", 1000);
    }
}

/* 🎵 MUSIC FADE IN */
function playMusic() {
    const audio = document.getElementById("bgm");
    audio.volume = 0;
    audio.play().catch(()=>{});

    let v = 0;
    const fade = setInterval(() => {
        v += 0.05;

        if (v >= 1) {
            v = 1;
            clearInterval(fade);
        }

        audio.volume = Math.min(Math.max(v, 0), 1);
    }, 120);
}

/* 🎇 CONFETTI EFFECT */
function confetti() {
    const colors = ["#ff4f78","#ffd93d","#6bcBef","#b28dff","#ff8fab"];

    for (let i = 0; i < 60; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),5000);
    }
}

window.onload = () => {
    setTimeout(playIntro, 400);
    setInterval(createFall, 350);
};

document.addEventListener("click", function once() {
    playMusic();
}, { once: true });

function start() {
    // playMusic();   // 🎵 MUSIC START
    confetti();    // 🎇 CONFETTI
    showPhotos();
}

function showPhotos() {
    const popup = document.getElementById("photoPopup");
    const container = document.getElementById("photoContainer");

    const photos = [
        "muah/kamu1.jpg",
        "muah/kamu2.jpg",
        "muah/kamu3.jpg",
        "muah/kamu4.jpg",
        "muah/kamu5.jpg",
        "muah/kamu6.jpg",
        "muah/kamu7.jpg",
        "muah/kamu8.jpg",
        "muah/kamu9.jpg",
        "muah/kamu10.jpg",
        "muah/kamu11.jpg",
        "muah/kamu12.jpg",
        "muah/kamu13.jpg",
        "muah/kamu14.jpg",
        "muah/kamu15.jpg",
        "muah/kamu16.jpg",
        "muah/kamu17.jpg",
        "muah/kamu18.jpg",
        "muah/kamu19.jpg",
        "muah/kamu20.jpg"
    ];

    container.innerHTML = "";

    photos.forEach((src, i) => {
        let img = document.createElement("img");
        img.src = src;
        img.className = "photo-item";
        img.style.animationDelay = (i * 0.25) + "s";
        container.appendChild(img);
    });

    popup.classList.add("active");

    setTimeout(() => {
        showPop("Happy Birthday ❤️","Semoga semua yang kamu mau jadi kenyataan ya sayang 💗");
    }, 1000);
}

function showPop(title, msg) {
    document.getElementById("popup-title").innerText = title;
    document.getElementById("popup-msg").innerText = msg;
    document.getElementById("popup").classList.add("active");
}

function closePop() {
    document.getElementById("popup").classList.remove("active");
}

function createFall() {
    const el = document.createElement("div");
    el.classList.add("fall");

    const items = ["💖","🌸","💗","✨","🌷","💐"];
    el.innerText = items[Math.floor(Math.random()*items.length)];

    el.style.left = Math.random()*100 + "vw";
    el.style.fontSize = (14 + Math.random()*16) + "px";
    el.style.animationDuration = (3.5 + Math.random()*2.5) + "s";

    document.body.appendChild(el);
    setTimeout(()=>el.remove(),7000);
}

for (let i=0;i<8;i++){
    const h=document.createElement("div");
    h.className="bg-heart";
    h.innerText="💗";
    h.style.left=Math.random()*100+"vw";
    h.style.top=Math.random()*100+"vh";
    document.body.appendChild(h);
}

</script>

</body>
</html>
